<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Eats</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body background="backgd.jpg">
    <nav>
        <img src="menu.png" alt="">
        <h2><span class="highlight">Uber</span>Eats</h2>  
    <div class="right"> 
        <button class="logs">Log in</button>
        <button class="sign">Sign up</button>
    </div>
    </nav>

    <section>
        <h1>Order delivery near you</h1>
        <form action="" class="form"><br><br>
             <div class="addressBox">
                <img src="location.png" class="location-icon">
                <input type="text" name="" placeholder="Enter delivery address" class="firstbox">
             </div>

             <div class="deliverBox">
                <img src="clock.png" class="clock-icon">
                <input type="text" placeholder="Deliver now" class="secondbox">
                <img src="arrow.png" class="arrow-icon">
             </div>
            </form> 
            <div class="search">
                <button>Search here</button>
            </div>   
             <div class="signIn">
                <a href="#">Sign in</a>
            </div>
    </section>
</body>
</html>
